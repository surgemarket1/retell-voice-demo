<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Asistente Virtual — Rita</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }
    .container { text-align: center; max-width: 500px; padding: 40px 24px; }
    h1 { font-size: 32px; margin-bottom: 8px; color: #f8fafc; }
    .subtitle { color: #94a3b8; margin-bottom: 48px; font-size: 16px; }
    .cards { display: flex; flex-direction: column; gap: 16px; }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      text-decoration: none;
      color: #e2e8f0;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .card:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(34, 197, 94, 0.4);
      transform: translateY(-2px);
    }
    .card-icon { font-size: 40px; }
    .card-text { text-align: left; }
    .card-title { font-size: 18px; font-weight: 600; color: #f8fafc; }
    .card-desc { font-size: 14px; color: #94a3b8; margin-top: 4px; }
    .footer { margin-top: 48px; font-size: 12px; color: #475569; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎙️ Demo Rita</h1>
    <p class="subtitle">Seleccione su negocio para hablar con Rita, su asistente virtual</p>

    <div class="cards">
      <a href="/david" class="card">
        <div class="card-icon">🪟</div>
        <div class="card-text">
          <div class="card-title">Persiana Costa del Sol</div>
          <div class="card-desc">David — Reparacion e instalacion de persianas</div>
        </div>
      </a>

      <a href="/jose" class="card">
        <div class="card-icon">📡</div>
        <div class="card-text">
          <div class="card-title">Telecomunicaciones Caballero</div>
          <div class="card-desc">Jose Antonio — Antenas, porteros, CCTV y mas</div>
        </div>
      </a>
    </div>

    <div class="footer">Demo privada — Asistente Virtual con IA</div>
  </div>
</body>
</html>
